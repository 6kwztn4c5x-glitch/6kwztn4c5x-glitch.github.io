<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070a1a">
<title>Skylight</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; }
  html, body { height: 100%; }
  body { position: fixed; inset: 0; overflow: hidden; color: #eceaf2;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: radial-gradient(120% 80% at 50% 0%, #101636 0%, #0a0e26 55%, #070a1a 100%); }

  header { position: absolute; top: calc(18px + env(safe-area-inset-top)); left: 0; right: 0;
    text-align: center; z-index: 2; }
  h1 { font-size: 17px; font-weight: 700; letter-spacing: .3em; text-transform: uppercase; color: #8f95b8; }
  .count { font-size: 13px; color: #5d6284; margin-top: 4px; }

  #sky { position: absolute; inset: 0; }
  .grain { position: absolute; border-radius: 50%; background: #fff; opacity: .16; }

  svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .cline { stroke: rgba(245,196,105,.55); stroke-width: 1.4;
    stroke-dasharray: var(--l); stroke-dashoffset: var(--l); animation: draw 1.1s ease forwards;
    filter: drop-shadow(0 0 3px rgba(245,196,105,.5)); }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  .star { position: absolute; width: 34px; height: 34px; margin: -17px 0 0 -17px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; transition: all .5s; }
  .star .core { width: 7px; height: 7px; border-radius: 50%; background: #454b70; transition: all .5s; }
  .star.active .core { background: #cdd3f2; box-shadow: 0 0 10px rgba(205,211,242,.9); transform: scale(1.5);
    animation: breathe 2.2s infinite; }
  @keyframes breathe { 50% { box-shadow: 0 0 18px rgba(205,211,242,1); } }
  .star.lit .core { background: #f5c469; transform: scale(1.9);
    box-shadow: 0 0 14px rgba(245,196,105,.95), 0 0 40px rgba(245,166,35,.4); animation: twinkle 3.4s infinite; }
  @keyframes twinkle { 50% { box-shadow: 0 0 8px rgba(245,196,105,.7), 0 0 24px rgba(245,166,35,.25); } }

  .rail { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
    padding: 10px 0 calc(22px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, transparent, rgba(7,10,26,.94) 34%); }
  .cards { display: flex; gap: 12px; overflow-x: auto; padding: 14px 18px; scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .cards::-webkit-scrollbar { display: none; }
  .tcard { flex: none; width: 78vw; max-width: 340px; scroll-snap-align: center;
    background: rgba(22,27,54,.92); border: 1px solid rgba(255,255,255,.09); border-radius: 20px;
    padding: 18px 18px 16px; backdrop-filter: blur(8px); transition: opacity .4s, transform .4s; }
  .tcard.lit { opacity: .45; }
  .tcard .k { font-size: 11.5px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase;
    color: #8f95b8; margin-bottom: 6px; }
  .tcard.focus .k { color: #f5c469; }
  .tcard .n { font-size: 19px; font-weight: 700; line-height: 1.3; min-height: 50px; }
  .tcard .n.struck { text-decoration: line-through; color: #7d829e; }
  .tcard button { margin-top: 12px; width: 100%; border: 0; border-radius: 12px; padding: 12px;
    font-size: 15.5px; font-weight: 800; cursor: pointer; font-family: inherit;
    background: rgba(245,166,35,.92); color: #241804; }
  .tcard.lit button { background: rgba(255,255,255,.1); color: #6d7397; }

  .fin { position: absolute; inset: 0; display: none; z-index: 4; align-items: center; justify-content: center;
    text-align: center; background: rgba(7,10,26,.72); backdrop-filter: blur(6px); }
  .fin.show { display: flex; }
  .fin h2 { font-size: 26px; font-weight: 800; }
  .fin .cname { color: #f5c469; font-size: 17px; margin-top: 8px; font-weight: 700; letter-spacing: .06em; }
  .fin p { color: #8f95b8; margin-top: 8px; font-size: 14.5px; }
</style>
</head>
<body>
<header><h1>Skylight</h1><div class="count" id="count"></div></header>
<div id="sky"></div>
<svg id="lines" xmlns="http://www.w3.org/2000/svg"></svg>
<div class="rail"><div class="cards" id="cards"></div></div>
<div class="fin" id="fin"><div>
  <h2>The sky is full.</h2>
  <div class="cname" id="cname"></div>
  <p>Seven stars. Yours. Saved to the gallery.</p>
</div></div>

<script>
const TASKS = [
  { id: 1, name: "Review the Fable sweep", focus: true },
  { id: 2, name: "Soccer camp signup" },
  { id: 3, name: "Walk — 30 easy minutes" },
  { id: 4, name: "Draft the HO opener" },
  { id: 5, name: "Reply in the Lily group" },
  { id: 6, name: "Water the porch plants" },
  { id: 7, name: "Read 20 pages" },
];
// hand-placed star field (fractions of viewport), roughly a pleasing spread
const POS = [
  [.50, .20], [.26, .30], [.70, .33], [.38, .45], [.62, .52], [.30, .60], [.55, .66],
];
const lit = [];

// background grain stars
const sky = document.getElementById("sky");
for (let i = 0; i < 70; i++) {
  const g = document.createElement("div");
  g.className = "grain";
  const s = Math.random() * 2 + .6;
  g.style.width = g.style.height = s + "px";
  g.style.left = Math.random() * 100 + "%";
  g.style.top = Math.random() * 72 + "%";
  g.style.opacity = .05 + Math.random() * .2;
  sky.appendChild(g);
}

// task stars
TASKS.forEach((t, i) => {
  const el = document.createElement("div");
  el.className = "star";
  el.id = "star-" + t.id;
  el.style.left = POS[i][0] * 100 + "%";
  el.style.top = POS[i][1] * 100 + "%";
  el.innerHTML = `<div class="core"></div>`;
  sky.appendChild(el);
});

// cards
const cards = document.getElementById("cards");
TASKS.forEach(t => {
  const c = document.createElement("div");
  c.className = "tcard" + (t.focus ? " focus" : "");
  c.id = "card-" + t.id;
  c.innerHTML = `<div class="k">${t.focus ? "★ focus" : "on the board"}</div>
    <div class="n">${t.name}</div><button>Light it</button>`;
  c.querySelector("button").addEventListener("click", () => light(t.id));
  cards.appendChild(c);
});

// active star follows the centered card
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    const id = e.target.id.replace("card-", "");
    const star = document.getElementById("star-" + id);
    if (e.isIntersecting && e.intersectionRatio > .6 && !star.classList.contains("lit"))
      star.classList.add("active");
    else star.classList.remove("active");
  });
}, { root: cards, threshold: [0, .6, 1] });
document.querySelectorAll(".tcard").forEach(c => io.observe(c));

function starXY(id) {
  const i = TASKS.findIndex(t => t.id === id);
  return [POS[i][0] * innerWidth, POS[i][1] * innerHeight];
}

function light(id) {
  if (lit.includes(id)) return;
  const star = document.getElementById("star-" + id);
  star.classList.remove("active");
  star.classList.add("lit");
  const card = document.getElementById("card-" + id);
  card.classList.add("lit");
  card.querySelector(".n").classList.add("struck");
  card.querySelector("button").textContent = "lit ✦";
  if (lit.length > 0) {
    const [x1, y1] = starXY(lit[lit.length - 1]);
    const [x2, y2] = starXY(id);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    const len = Math.hypot(x2 - x1, y2 - y1);
    line.setAttribute("x1", x1); line.setAttribute("y1", y1);
    line.setAttribute("x2", x2); line.setAttribute("y2", y2);
    line.setAttribute("class", "cline");
    line.style.setProperty("--l", len);
    document.getElementById("lines").appendChild(line);
  }
  lit.push(id);
  update();
  if (lit.length === TASKS.length) setTimeout(finish, 1400);
}

function update() {
  document.getElementById("count").textContent = `${lit.length} of ${TASKS.length} stars lit`;
}
update();

const NAMES = ["The Quiet Oar", "The Long Porch", "The Kind Tide", "The Seventh Lantern", "The Walking Sky"];
function finish() {
  document.getElementById("cname").textContent =
    "→ " + NAMES[(new Date().getDate()) % NAMES.length];
  document.getElementById("fin").classList.add("show");
}
document.getElementById("fin").addEventListener("click", () => document.getElementById("fin").classList.remove("show"));
</script>
</body>
</html>
