/* ═══════════════ creatures — residents of the water ═══════════════ */
let lastStage = -1;
function creatureSpots() {
  // open-water gaps: between consecutive islands, offset off-route
  const gaps = [];
  const pts = L.points;
  for (let i = 1; i < pts.length; i++) {
    const a = pts[i - 1], b = pts[i];
    gaps.push({ x: (a.x + b.x) / 2 + (i % 2 ? -L.w * .3 : L.w * .3), y: (a.y + b.y) / 2 });
  }
  return gaps;
}
function updateCreatures() {
  const stage = Math.min(pressureStage(), 4);
  const msk = "voyage_maxstage_" + todayISO();
  maxStageToday = Math.max(maxStageToday, stage, parseInt(localStorage.getItem(msk) || "0"));
  localStorage.setItem(msk, String(maxStageToday));
  document.querySelectorAll(".creature").forEach(c => c.remove());
  const spots = creatureSpots();
  if (!spots.length) return;
  const boatP = wakeEl && boatLen !== null ? wakeEl.getPointAtLength(Math.min(boatLen, RL - 1)) : { x: L.w / 2, y: L.points[0].y };
  const near = (k) => ({
    x: Math.max(L.w * .14, Math.min(L.w * .86, boatP.x + (boatP.x < L.w / 2 ? 1 : -1) * L.w * k)),
    y: boatP.y + L.isleH * k * 1.6 });
  const mk = (id, src, w, x, y, extra) => {
    const el = document.createElement("div");
    el.className = "creature" + (weatherChanged() || stage === 0 && id !== "cr-serpent" && id !== "cr-sirens" ? "" : "");
    el.id = id;
    el.style.cssText = `width:${w}px;height:${w}px;left:${x - w / 2}px;top:${y - w / 2}px;animation:crbob ${4.5 + Math.random() * 2}s ease-in-out infinite;${extra || ""}`;
    el.innerHTML = `<img src="art/${src}.png" alt=""><div class="cmirror"><img src="art/${src}.png" alt=""></div>`;
    document.getElementById("world").appendChild(el);
    return el;
  };
  const BW = BOAT_PX;
  const far1 = spots[Math.min(2, spots.length - 1)], far2 = spots[Math.min(4, spots.length - 1)];
  if (weatherChanged()) return; // all submerged on a weather day
  // serpent: always resident; approaches by stage
  const sSrc = stage >= 3 ? "serpent-close" : stage >= 1 ? "serpent-sly" : "serpent-calm";
  const sPos = stage >= 3 ? near(.34) : stage >= 1 ? near(.44) : far1;
  mk("cr-serpent", sSrc, BW * (stage >= 3 ? 1.55 : stage >= 1 ? 1.35 : 1.2), sPos.x, sPos.y);
  // sirens: resident on their rocks; hungry from stage 2
  const siSrc = stage >= 2 ? "sirens-hungry" : "sirens-calm";
  const siPos = stage >= 2 ? near(.52) : far2;
  mk("cr-sirens", siSrc, BW * (stage >= 2 ? 1.5 : 1.3), siPos.x, siPos.y);
  // tentacle from stage 2
  if (stage >= 2) { const p = near(.6); mk("cr-tentacle", "tentacle", BW * 1.25, p.x, p.y + L.isleH * .5); }
  // kraken: eyes at 3, full rise at 4 — near the boat
  if (stage >= 3) {
    const p = near(.22);
    mk("cr-kraken", stage >= 4 ? "kraken-full" : "kraken-eyes", BW * (stage >= 4 ? 2.5 : 1.7), p.x, p.y + L.isleH * .35);
  }
  document.body.classList.toggle("kraken-up", stage >= 4);
  if (lastStage > stage && lastStage >= 0)
    toast(lastStage >= 4 ? "The kraken sinks back — made it anyway" : "The sea eases");
  lastStage = stage;
}

/* ═══════════════ sheet (M1 minimal port; M4 rebuilds) ═══════════════ */
const sheet = document.getElementById("sheet"), veil = document.getElementById("veil");
/* one signature verb per island kind */
function kindVerb(t) {
  const kind = artFor(t), n = t.name + " " + (t.sub || "");
  const num = (n.match(/\+?[\d][\d\s().-]{6,}\d/) || [])[0];
  if (kind === "tincan" && num) return { a: "callnow", label: "Call now · " + num.trim().slice(0, 14) };
  if (kind === "tincan") return { a: "sail20", label: "Make the call · 15m of water" };
  if (kind === "campfire") return { a: "sail20", label: "Wind down · settle in" };
  if (kind === "dinghy-moored") return { a: "handoff", label: "Hand it off · another boat takes it" };
  return null;
}
function openSheet(id) {
  const t = tasks.find(x => String(x.id) === String(id));
  if (!t) return;
  const meta = t.timed ? `fixed at ${fmtT(t.timed)}` : `${effectiveReach(t)}${drifted(t) ? " · drifted" : ""}`;
  const c = crossing(), onThis = c && String(c.id) === String(t.id);
  const kv = !t.done && !t.blocked && !onThis ? kindVerb(t) : null;
  sheet.innerHTML = `<div class="t">${esc(t.name)}</div>
    <div class="s">${esc(t.blocked ? t.blockedWhy : (t.sub || meta))}${onThis ? " · under way" : ""}</div>
    <div class="acts">
      ${t.done ? `<button class="primary" data-a="reopen">Reopen — back on the water</button>`
      : t.blocked ? `<button class="primary" data-a="unblock">Unblock — back on the route</button>`
      : onThis ? `<button class="primary" data-a="done">Landed — done</button>`
      : `${kv ? `<button class="primary" data-a="${kv.a}">${esc(kv.label)}</button>` : ""}
         ${t.durMin && (!kv || kv.a === "callnow" || kv.a === "handoff") ? `<button class="${kv ? "" : "primary"}" data-a="sail">Set sail · about ${t.durMin}m</button>` : ""}
         <button class="${kv || t.durMin ? "" : "primary"}" data-a="done">Done — sail on</button>
         <button data-a="doneenough">Done enough — it counts</button>
         <button data-a="time">Move its time</button>
         <button data-a="tomorrow">Sails tomorrow</button>
         <button data-a="park">Park it — no judgment</button>`}
      <button data-a="close" class="quiet">back</button>
    </div>`;
  sheet.querySelectorAll("button").forEach(b => b.addEventListener("click", () => act(t, b.dataset.a)));
  document.body.classList.add("sheet-open");
}
function closeSheet() { document.body.classList.remove("sheet-open"); }
veil.addEventListener("click", closeSheet);

async function act(t, a) {
  if (a === "close") return closeSheet();
  try {
    if (a === "sail") { setSail(t.id); return; }
    if (a === "done") {
      closeSheet();
      const wasLate = lateMin(t) > 0;
      const c = crossing(), onThis = c && String(c.id) === String(t.id);
      t.done = true;
      if (onThis) endCrossing();
      if (!DEMO) await api("POST", `tasks/${t.id}/close`);
      const isle = document.querySelector(`.island[data-id="${t.id}"]`);
      if (isle) { isle.classList.remove("foggy", "next", "soon"); isle.classList.add("done"); }
      if (!crossing()) sailTo(frontierLen(), true);
      if (wasLate) setTimeout(() => toast("Landed late — but landed. The sea takes note."), 900);
      markFog(); updateCreatures(); updateTow();
      document.getElementById("prog").textContent =
        `${active().filter(x => x.done).length} of ${active().length} islands`;
    } else if (a === "doneenough") {
      closeSheet();
      const wasLate = lateMin(t) > 0;
      const c2 = crossing(); if (c2 && String(c2.id) === String(t.id)) endCrossing();
      t.done = true;
      if (!DEMO) await api("POST", `tasks/${t.id}/close`);
      const isle = document.querySelector(`.island[data-id="${t.id}"]`);
      if (isle) { isle.classList.remove("foggy", "next", "soon"); isle.classList.add("done"); }
      if (!crossing()) sailTo(frontierLen(), true);
      toast("Done enough is done — the island lights all the same", { undo: () => act(t, "reopen") });
      markFog(); updateCreatures(); updateTow();
      document.getElementById("prog").textContent =
        `${active().filter(x => x.done).length} of ${active().length} islands`;
    } else if (a === "tomorrow") {
      closeSheet();
      journalAdd(t, "tomorrow");
      if (!DEMO) await api("POST", `tasks/${t.id}`, { due_string: "tomorrow" });
      const snapshot = t;
      tasks = tasks.filter(x => x.id !== t.id);
      toast("Sails tomorrow — tomorrow's water will hold it", { undo: () => bringBack(journal().find(e => String(e.id) === String(snapshot.id))) });
      boatLen = null; render(true);
    } else if (a === "park") {
      closeSheet();
      journalAdd(t, "park");
      if (!DEMO) await api("POST", `tasks/${t.id}`, { due_string: "no due date" });
      const snapshot = t;
      tasks = tasks.filter(x => x.id !== t.id);
      toast("Parked in calm water — no judgment, no teeth", { undo: () => bringBack(journal().find(e => String(e.id) === String(snapshot.id))) });
      boatLen = null; render(true);
    } else if (a === "time") {
      const v = prompt("What time? (e.g. 3pm, 15:30)");
      if (v && v.trim()) {
        closeSheet();
        if (!DEMO) await api("POST", `tasks/${t.id}`, { due_string: "today " + v.trim() });
        else { const d = new Date(); const m = v.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i); if (m) { let hh = +m[1]; if (/pm/i.test(m[3]) && hh < 12) hh += 12; d.setHours(hh, +(m[2] || 0), 0, 0); t.timed = d; } }
        toast("Anchored to its hour");
        boatLen = null; if (!DEMO) await loadTasks(); render(true);
      }
    } else if (a === "callnow") {
      const n = ((t.name + " " + (t.sub || "")).match(/\+?[\d][\d\s().-]{6,}\d/) || [])[0];
      if (n) location.href = "tel:" + n.replace(/[^\d+]/g, "");
      return;
    } else if (a === "sail20") {
      t.durMin = t.durMin || (artFor(t) === "campfire" ? 25 : 15);
      setSail(t.id);
      return;
    } else if (a === "handoff") {
      closeSheet();
      journalAdd(t, "handoff");
      if (!DEMO) await api("POST", `tasks/${t.id}`, { due_string: "tomorrow" });
      const snapshot = t;
      tasks = tasks.filter(x => x.id !== t.id);
      toast("Ferried to another boat — handed off with thanks", { undo: () => bringBack(journal().find(e => String(e.id) === String(snapshot.id))) });
      boatLen = null; render(true);
    } else if (a === "reopen") {
      closeSheet();
      t.done = false;
      if (!DEMO) await api("POST", `tasks/${t.id}/reopen`);
      toast("Back on the water");
      boatLen = null; render(true);
    } else if (a === "unblock") {
      closeSheet();
      t.blocked = false; t.blockedWhy = "";
      if (!DEMO) await api("POST", `tasks/${t.id}`, { description: "" });
      boatLen = null; render(true);
    }
  } catch (e) { toast("Couldn't save that — try again"); }
}

/* ═══════════════ THE CAPTAIN'S CHART — command room: drag, hour rail, sent-away ═══════════════ */
const chart = document.getElementById("chart");
document.getElementById("chartbtn").addEventListener("click", () => { buildChart(); document.body.classList.add("chart-open"); });
function chartClose() { document.body.classList.remove("chart-open"); }

function railHours(r) { return { start: RSTART[r], end: REND[r] }; }
function buildChart() {
  const hh = nowH();
  const mode = hh < 10 ? "morning" : hh >= 18 ? "evening" : "day";
  const head = mode === "morning" ? ["Morning chart", "coffee over the chart — glance, then sail; nothing here is homework"]
    : mode === "evening" ? ["Landing chart", "the day is what it was — set tomorrow gently"]
    : ["The Captain's Chart", "drag islands between waters · drop on the rail for an exact time"];
  const groups = orderIslands();
  const lapsed = active().filter(t => drifted(t) && !t.done);
  let h = `<div class="ch-head"><h2>${head[0]}</h2><button class="ch-close" id="chx">×</button></div>
    <div class="ch-sub">${head[1]}</div>`;
  if (lapsed.length) h += `<button class="ch-tide" id="tidebtn">Tide changed — redraw the route (${lapsed.length} drifting)</button>`;
  REACHES.forEach(r => {
    const list = groups[r];
    if (!list.length && r === "anytime") return;
    h += `<div class="ch-reach" data-reach="${r}"><h3>${RLABEL[r]}</h3>`;
    if (r !== "anytime") {
      h += `<div class="hourrail" data-reach="${r}">`;
      for (let t15 = RSTART[r]; t15 < REND[r]; t15 += 1)
        h += `<div class="tick" style="top:${((t15 - RSTART[r]) / (REND[r] - RSTART[r])) * 100}%">${t15 % 12 || 12}${t15 < 12 ? "a" : "p"}</div>`;
      h += `<div class="railcursor"></div></div>`;
    }
    list.forEach(t => {
      const meta = [t.timed ? fmtT(t.timed) : null, t.durMin ? "~" + t.durMin + "m" : null, drifted(t) ? "drifted" : null, t.sub || null].filter(Boolean).join(" · ");
      h += `<div class="ch-row ${t.done ? "done" : ""}" data-id="${t.id}">
        <img src="art/${artFor(t)}.png" alt="" draggable="false">
        <div class="n">${esc(t.name)}${meta ? `<span class="meta">${esc(meta)}</span>` : ""}</div>
        <div class="ract">
          ${t.done ? `<button data-a="reopen">undo</button>` : `<button data-a="done">✓</button>
          <button data-a="tomorrow">tomorrow</button>`}
        </div></div>`;
    });
    h += `</div>`;
  });
  const bl = blockedList();
  if (bl.length) {
    h += `<div class="ch-reach"><h3>Anchored offshore</h3>`;
    bl.forEach(t => {
      h += `<div class="ch-row" data-id="${t.id}"><img src="art/buoy.png" alt="" draggable="false">
        <div class="n">${esc(t.name)}<span class="meta">${esc(t.blockedWhy)}</span></div>
        <div class="ract"><button data-a="unblock">sail</button></div></div>`;
    });
    h += `</div>`;
  }
  const sent = journal();
  if (sent.length) {
    h += `<div class="ch-reach"><h3>Sent away today — one tap brings anything back</h3>`;
    sent.forEach((e, i) => {
      h += `<div class="ch-row" data-j="${i}">
        <div class="n">${esc(e.name)}<span class="meta">${e.action === "park" ? "parked, no due date" : e.action === "handoff" ? "handed off" : "sailed to tomorrow"}</span></div>
        <div class="ract"><button data-bring="${i}">bring back</button></div></div>`;
    });
    h += `</div>`;
  }
  const doneN = active().filter(t => t.done).length;
  h += `<div class="ch-sub" style="margin-top:8px">${doneN} lit · ${active().length - doneN} on the water${mode === "evening" ? " · the fire waits where you land" : ""}</div>`;
  chart.innerHTML = h;
  document.getElementById("chx").addEventListener("click", chartClose);
  const tb = document.getElementById("tidebtn");
  if (tb) tb.addEventListener("click", tideChanged);
  chart.querySelectorAll("[data-bring]").forEach(b =>
    b.addEventListener("click", () => bringBack(journal()[+b.dataset.bring])));
  chart.querySelectorAll(".ch-row .ract button[data-a]").forEach(b => {
    b.addEventListener("click", async (e) => {
      e.stopPropagation();
      const id = b.closest(".ch-row").dataset.id;
      const t = tasks.find(x => String(x.id) === String(id));
      if (!t) return;
      await act(t, b.dataset.a);
      buildChart();
    });
  });
  wireChartDrag();
}
async function tideChanged() {
  const lapsed = active().filter(t => drifted(t) && !t.done);
  const cur = isNight() ? "evening" : currentReach();
  for (const t of lapsed) await setReach(t, cur);
  toast("Route redrawn — tide changed, no notes taken");
  boatLen = null; render(true); buildChart();
}
async function setReach(t, r) {
  const newLabels = (t.labels || []).filter(l => !REACHES.includes(l));
  if (r !== "anytime") newLabels.push(r);
  t.labels = newLabels; t.reachLabel = r === "anytime" ? null : r;
  if (t.timed && r !== baseReach(t)) { t.timed = null; if (!DEMO) await api("POST", `tasks/${t.id}`, { due_string: "today" }); }
  if (!DEMO) await api("POST", `tasks/${t.id}`, { labels: newLabels });
}

/* drag an island between waters; drop on the rail = pin an exact time.
   grab: instantly by the picture, or hold anywhere on the row for a third of a second. */
function wireChartDrag() {
  chart.querySelectorAll(".ch-row[data-id]").forEach(row => {
    const id = row.dataset.id;
    const t = tasks.find(x => String(x.id) === String(id));
    if (!t || t.done || t.blocked) return;
    const img = row.querySelector("img");

    const beginDrag = (e, src) => {
      document.body.classList.add("chart-dragging");
      src.setPointerCapture(e.pointerId);
      const ghost = row.cloneNode(true);
      ghost.classList.add("ch-ghost");
      document.body.appendChild(ghost);
      ghost.style.left = e.clientX + "px"; ghost.style.top = e.clientY + "px";
      row.classList.add("dragging");
      let over = null, railReach = null, railFrac = 0;
      const move = ev => {
        ev.preventDefault();
        ghost.style.left = ev.clientX + "px"; ghost.style.top = ev.clientY + "px";
        ghost.style.display = "none";
        const el = document.elementFromPoint(ev.clientX, ev.clientY);
        ghost.style.display = "";
        const g = el && el.closest ? el.closest(".ch-reach[data-reach]") : null;
        chart.querySelectorAll(".ch-reach").forEach(x => { x.classList.remove("dropover", "railon"); const rc = x.querySelector(".railcursor"); if (rc) rc.style.display = "none"; });
        over = g ? g.dataset.reach : null;
        railReach = null;
        if (g) {
          g.classList.add("dropover");
          const rail = g.querySelector(".hourrail");
          const wantsRail = t.timed || (rail && ev.clientX > g.getBoundingClientRect().right - 96);
          if (rail && wantsRail && over !== "anytime") {
            g.classList.add("railon");
            const rb = rail.getBoundingClientRect();
            railFrac = Math.max(0, Math.min(1, (ev.clientY - rb.top) / rb.height));
            const rc = rail.querySelector(".railcursor");
            railReach = over;
            rc.style.display = "block"; rc.style.top = (railFrac * 100) + "%";
          }
        }
      };
      const finish = async () => {
        src.removeEventListener("pointermove", move);
        document.body.classList.remove("chart-dragging");
        ghost.remove(); row.classList.remove("dragging");
        chart.querySelectorAll(".ch-reach").forEach(x => x.classList.remove("dropover", "railon"));
        try {
          if (railReach) {
            const span = REND[railReach] - RSTART[railReach];
            const hSnap = Math.round((RSTART[railReach] + railFrac * span) * 4) / 4;
            const hh = Math.floor(hSnap), mm = Math.round((hSnap - hh) * 60);
            if (!DEMO) await api("POST", `tasks/${t.id}`, { due_string: `today ${hh}:${String(mm).padStart(2, "0")}` });
            else { const d = new Date(); d.setHours(hh, mm, 0, 0); t.timed = d; }
            toast(`Anchored at ${hh % 12 || 12}:${String(mm).padStart(2, "0")}${hh < 12 ? "am" : "pm"}`);
            if (!DEMO) await loadTasks();
            boatLen = null; render(true); buildChart();
          } else if (over && over !== effectiveReach(t)) {
            await setReach(t, over);
            toast(`Moved to ${over === "anytime" ? "open water" : over + " water"}`);
            boatLen = null; render(true); buildChart();
          }
        } catch { toast("Couldn't move that — try again"); }
      };
      src.addEventListener("pointermove", move);
      src.addEventListener("pointerup", finish, { once: true });
      src.addEventListener("pointercancel", finish, { once: true });
    };

    // instant drag from the picture
    img.addEventListener("pointerdown", e => { e.preventDefault(); beginDrag(e, img); });
    // hold-to-drag from anywhere else on the row
    row.addEventListener("pointerdown", e => {
      if (e.target === img || e.target.closest(".ract")) return;
      const timer = setTimeout(() => { beginDrag(e, row); }, 340);
      const cancel = () => clearTimeout(timer);
      row.addEventListener("pointermove", function mv(ev) {
        if (Math.abs(ev.clientY - e.clientY) > 12) { cancel(); row.removeEventListener("pointermove", mv); }
      });
      row.addEventListener("pointerup", cancel, { once: true });
      row.addEventListener("pointercancel", cancel, { once: true });
    });
  });
}

/* ═══════ one tap, talk — Apple on-device speech straight onto the water ═══════ */
async function createParsed(parsed) {
  for (const p of parsed) {
    if (DEMO) {
      const d = p.timed ? new Date() : null;
      if (d) d.setHours(p.timed.hh, p.timed.mm, 0, 0);
      tasks.push({ id: "d" + Math.random(), name: p.text, sub: "", done: false,
        labels: p.reach ? [p.reach] : [], reachLabel: p.reach, timed: d, durMin: p.durMin });
    } else {
      const body = { content: p.text + (p.durMin ? ` ~${p.durMin}m` : ""), labels: p.reach ? [p.reach] : [] };
      body.due_string = p.timed ? `today ${p.timed.hh}:${String(p.timed.mm).padStart(2, "0")}` : "today";
      const created = await api("POST", "tasks", body);
      tasks.push(mapTask(created));
    }
  }
}
(function wireMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const mic = document.getElementById("micfab"), live = document.getElementById("livewords");
  if (!SR) { mic.addEventListener("click", () => document.getElementById("addfab").click()); return; }
  let rec = null, finalText = "", wantStop = false, restarts = 0;
  const finalize = async () => {
    mic.classList.remove("listening"); document.body.classList.remove("listening");
    const said = finalText.trim();
    rec = null; live.textContent = ""; finalText = ""; wantStop = false; restarts = 0;
    if (!said) { toast("Didn't catch that — tap, talk, tap again"); return; }
    const parsed = parseCapture(said);
    if (!parsed.length) { toast("Didn't catch that — try again"); return; }
    try {
      await createParsed(parsed);
      toast(parsed.length > 1 ? parsed.length + " islands rise from the sea" : "An island rises from the sea");
      boatLen = null; render(true);
    } catch { toast("Couldn't add — try again"); }
  };
  const startRec = () => {
    rec = new SR();
    rec.lang = "en-US"; rec.interimResults = true; rec.continuous = true;
    rec.onresult = ev => {
      let interim = "";
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        if (ev.results[i].isFinal) finalText += ev.results[i][0].transcript + " ";
        else interim += ev.results[i][0].transcript;
      }
      const shown = (finalText + interim).trim();
      live.textContent = shown ? shown.slice(-140) : "listening… tap the square when you're done";
    };
    rec.onerror = () => {};
    rec.onend = () => {
      // Safari gives up on pauses — resume silently until HE taps the square
      if (!wantStop && restarts < 40 && document.body.classList.contains("listening")) {
        restarts++;
        try { startRec(); return; } catch {}
      }
      finalize();
    };
    rec.start();
  };
  mic.addEventListener("click", () => {
    if (rec || document.body.classList.contains("listening")) { wantStop = true; try { rec && rec.stop(); } catch { finalize(); } return; }
    finalText = ""; wantStop = false; restarts = 0;
    mic.classList.add("listening"); document.body.classList.add("listening");
    live.textContent = "listening… tap the square when you're done";
    try { startRec(); } catch { finalize(); }
  });
})();

/* ═══════ capture: talk (iOS dictation) or type — the parser reads times, spans, waters, and splits ═══════ */
function parseCapture(raw) {
  // split one utterance into tasks on strong separators
  const parts = raw.split(/(?:,\s+and\s+|;\s*|\.\s+(?=[A-Z])|\s+and\s+(?:also\s+)?(?=\w+\s))/i)
    .map(s => s.trim()).filter(s => s.length > 2);
  return (parts.length ? parts : [raw]).map(part => {
    let text = part, timed = null, durMin = null, reach = null;
    const tm = text.match(/\b(?:at|by)\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\b/i);
    if (tm) {
      let hh = +tm[1]; const mm = +(tm[2] || 0);
      if (/pm/i.test(tm[3]) && hh < 12) hh += 12;
      else if (!tm[3] && hh <= 7) hh += 12;          // "at 4" during the day usually means 4pm
      timed = { hh, mm };
      text = text.replace(tm[0], "").trim();
    }
    const dm = text.match(/\b(?:for\s+)?(?:about\s+)?(?:(\d{1,3})\s*(?:min|minutes|m\b)|half\s+(?:an\s+)?hour|(\d{1,2})\s*hours?)\b/i);
    if (dm) {
      durMin = dm[1] ? +dm[1] : dm[2] ? +dm[2] * 60 : 30;
      text = text.replace(dm[0], "").trim();
    }
    const rm = text.match(/\b(?:this\s+|in\s+the\s+)?(morning|midday|afternoon|evening|tonight)\b/i);
    if (rm) {
      reach = rm[1].toLowerCase() === "tonight" ? "evening" : rm[1].toLowerCase();
      text = text.replace(rm[0], "").trim();
    }
    text = text.replace(/^(?:i\s+(?:need|have|want)\s+to|gotta|remember\s+to|don't\s+forget\s+to)\s+/i, "")
      .replace(/\s{2,}/g, " ").replace(/^[,.\s]+|[,.\s]+$/g, "");
    return { text: text.charAt(0).toUpperCase() + text.slice(1), timed, durMin, reach };
  }).filter(p => p.text.length > 1);
}

function toast(msg, opts) {
  document.querySelectorAll(".toast").forEach(t => t.remove());
  const el = document.createElement("div"); el.className = "toast";
  el.textContent = msg;
  if (opts && opts.undo) {
    const b = document.createElement("button");
    b.textContent = "↩︎ undo";
    b.style.cssText = "margin-left:10px;border:0;background:none;color:#f5c469;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit";
    b.addEventListener("click", () => { el.remove(); opts.undo(); });
    el.appendChild(b);
  }
  document.body.appendChild(el);
  setTimeout(() => el.remove(), opts && opts.undo ? 6000 : 3400);
}

/* ═══════ the storm curtain: pull it down over the scene; push it back up when skies clear ═══════ */
const PEEK = 36;   // resting sliver of cloud at the top of the sky
function shadeBaseY() { return weatherChanged() ? -window.innerHeight * .14 : -window.innerHeight + PEEK; }
function setShade(y, animate) {
  const veil = document.getElementById("shadeveil"), lip = document.getElementById("shadelip");
  veil.style.transition = animate ? "" : "none";
  lip.style.transition = animate ? "" : "none";
  veil.style.transform = `translateY(${y}px)`;
  lip.style.top = Math.max(0, window.innerHeight + y - 46) + "px";
}
(function weatherShade() {
  const lip = document.getElementById("shadelip");
  let startY = null, dy = 0;
  const vh = () => window.innerHeight;
  setShade(shadeBaseY(), false);
  lip.addEventListener("pointerdown", e => {
    startY = e.clientY; dy = 0;
    lip.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  // belt + braces: iOS pull-to-refresh must never win against the curtain
  lip.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
  lip.addEventListener("touchstart", e => e.preventDefault(), { passive: false });
  lip.addEventListener("pointermove", e => {
    if (startY === null) return;
    dy = e.clientY - startY;
    const y = Math.max(-vh() + 6, Math.min(shadeBaseY() + dy, -vh() * .06));
    setShade(y, false);
  });
  const settle = () => {
    if (startY === null) return;
    if (!weatherChanged() && dy > vh() * .32) {
      localStorage.setItem("weather_" + todayISO(), "1");
      document.body.classList.add("weatherday");
      toast("The weather turned — nothing counts against you today");
      render(true);
    } else if (weatherChanged() && dy < -vh() * .2) {
      localStorage.removeItem("weather_" + todayISO());
      document.body.classList.remove("weatherday");
      toast("Skies clearing — the sea wakes back up");
      render(true);
    }
    setShade(shadeBaseY(), true);
    startY = null; dy = 0;
  };
  lip.addEventListener("pointerup", settle);
  lip.addEventListener("pointercancel", settle);
  addEventListener("resize", () => setShade(shadeBaseY(), false));
})();

let lastY = 0;
addEventListener("scroll", () => {
  const y = scrollY;
  document.querySelector("header").classList.toggle("hidden", y > lastY && y > 120);

addEventListener("resize", () => { boatLen = null; render(); });

setInterval(() => { paintSky(); const nl = document.getElementById("nowline"); if (nl && L) nl.style.top = hourY() + "px"; }, 60000);

function showLoadingTide() {

}
function showStorm(msg) {
  document.getElementById("world").innerHTML = `<div id="sea"></div>
    <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:30px">
      <div style="max-width:340px;text-align:center;background:rgba(20,26,51,.9);border:1px solid rgba(217,138,148,.35);border-radius:20px;padding:26px 22px">
        <div style="font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#d98a94;margin-bottom:8px">storm warning</div>
        <div style="font-size:17px;font-weight:800;margin-bottom:6px">${esc(msg)}</div>
        <div style="color:#9aa0bd;font-size:13.5px;margin-bottom:18px">the sea is still out there — we just can't see it from here</div>
        <button id="stormretry" style="border:0;border-radius:12px;background:#e8a33d;color:#241804;font-weight:800;font-size:15px;padding:12px 22px;cursor:pointer;font-family:inherit">Try again</button>
        <button id="stormdemo" style="border:0;background:none;color:#9aa0bd;font-size:13px;padding:12px;cursor:pointer;font-family:inherit;display:block;margin:6px auto 0">sail the demo instead</button>
      </div></div>`;
  document.getElementById("stormretry").addEventListener("click", boot);
  document.getElementById("stormdemo").addEventListener("click", () => { DEMO = true; boot(); });
}
async function boot() {
  if (!DEMO) showLoadingTide();
  try { await loadTasks(); }
  catch (e) {
    if (e.message === "auth") { DEMO = true; toast("Token didn't work — demo day for now"); await loadTasks(); }
    else { showStorm("Couldn't reach Todoist"); return; }
  }
  /* review aids */
  if (Q.get("weather") === "1") localStorage.setItem("weather_" + todayISO(), "1");
  else if (Q.get("weather") === "0") localStorage.removeItem("weather_" + todayISO());
  /* ?sail=<id>&sailprog=0..1 fakes an active crossing */
  if (Q.get("sail")) {
    const t = tasks.find(x => String(x.id) === String(Q.get("sail")));
    if (t && t.durMin) {
      const prog = parseFloat(Q.get("sailprog") || "0");
      localStorage.setItem(XKEY, JSON.stringify({ id: t.id, startedAt: Date.now() - prog * t.durMin * 60000, durMin: t.durMin, fromLen: 0 }));
    }
  } else if (DEMO) localStorage.removeItem(XKEY);
  boatLen = null;
  render();
  if (Q.get("chart") === "1") { buildChart(); document.body.classList.add("chart-open"); }
  /* open on the boat */
  setTimeout(() => {
    if (wakeEl && boatLen !== null) {
      const p = wakeEl.getPointAtLength(Math.max(0, Math.min(boatLen, RL - 1)));
      window.scrollTo(0, Math.max(0, p.y - unit * .45));
    }
  }, 80);
  /* warm the face-swap sprites so pressure changes never pop in late */
  setTimeout(() => {
    ["serpent-sly","serpent-close","sirens-hungry","tentacle","kraken-eyes","kraken-full","dinghy-tow","dock"]
      .forEach(n => { const i = new Image(); i.src = "art/" + n + ".png"; });
  }, 2500);
}
