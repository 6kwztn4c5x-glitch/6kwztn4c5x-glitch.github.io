<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1026">
<title>The Path — v2</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; }
  html, body { background: #0b1026; color: #ece9e2;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; }
  body { padding: calc(16px + env(safe-area-inset-top)) 0 30px; overflow-x: hidden; }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { padding: 4px 18px 8px; display: flex; justify-content: space-between; align-items: baseline; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -.3px; }
  .prog { color: #9aa0bd; font-size: 14px; font-weight: 600; }
  svg { width: 100%; height: auto; display: block; }

  .trail-base { stroke: rgba(255,241,214,.22); stroke-width: 4.5; fill: none; stroke-linecap: round;
    stroke-dasharray: 0.1 11; }
  .trail-lit { stroke: #f5a623; stroke-width: 4.5; fill: none; stroke-linecap: round;
    filter: drop-shadow(0 0 6px rgba(245,166,35,.55)); transition: stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1); }

  .stop { cursor: pointer; }
  .stop .plate { fill: rgba(11,16,38,.55); stroke: rgba(255,255,255,.14); stroke-width: 1.5; transition: all .4s; }
  .stop.focus .plate { stroke: rgba(245,166,35,.7); stroke-width: 2; }
  .stop.next .plate { animation: pulse 2.2s infinite; }
  @keyframes pulse { 0%,100% { stroke: rgba(245,166,35,.9); } 50% { stroke: rgba(255,255,255,.15); } }
  .stop.done .plate { fill: rgba(245,166,35,.16); stroke: rgba(245,166,35,.8);
    filter: drop-shadow(0 0 7px rgba(245,166,35,.45)); }
  .glyph { font-size: 21px; text-anchor: middle; dominant-baseline: central; }
  .stop.done .glyph { filter: saturate(1.2); }
  .label { font-size: 13.5px; font-weight: 600; fill: #e6e2d8; }
  .label .sub { font-size: 11px; fill: #8a8fa3; font-weight: 500; }
  .stop.done .label { fill: #7d829e; text-decoration: line-through; }
  .focuslbl { font-size: 15px; font-weight: 800; fill: #f5c469; }
  .waymark { font-size: 11.5px; font-style: italic; fill: #6d7397; }

  .traveler { filter: drop-shadow(0 0 7px rgba(122,220,255,.8)); }
  .cloud { animation: drift linear infinite; opacity: .5; }
  @keyframes drift { from { transform: translateX(-30px); } to { transform: translateX(510px); } }
  .glint { animation: glint 3.2s ease-in-out infinite; }
  @keyframes glint { 0%,100% { opacity: .15; } 50% { opacity: .6; } }
  .fire { animation: flick 1.6s ease-in-out infinite; transform-origin: center; }
  @keyframes flick { 50% { opacity: .55; } }
  .fly { animation: floaty 5s ease-in-out infinite; }
  @keyframes floaty { 0%,100% { transform: translate(0,0); opacity: .8; } 50% { transform: translate(9px,-12px); opacity: .25; } }

  .fin { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(11,16,38,.86); backdrop-filter: blur(8px); z-index: 5; text-align: center; }
  .fin.show { display: flex; }
  .fin .big { font-size: 54px; }
  .fin h2 { font-size: 26px; margin: 12px 0 6px; }
  .fin p { color: #9aa0bd; }
  .confetti { position: fixed; top: -10px; font-size: 18px; z-index: 6; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(105vh) rotate(720deg); opacity: .2; } }
</style>
</head>
<body>
<div class="wrap">
  <header><h1>The Path</h1><div class="prog" id="prog"></div></header>
  <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<div class="fin" id="fin"><div>
  <div class="big">⛵️</div><h2>Day walked.</h2><p id="finline"></p>
</div></div>

<script>
// —— demo day: each stop has a kind → its own landmark + celebration weight
const TASKS = [
  { id: 1, name: "Review the Fable sweep", sub: "the one that moves the week", glyph: "🗼", focus: true },
  { id: 2, name: "Soccer camp signup",     sub: "once the physical clears",    glyph: "⚽️" },
  { id: 3, name: "Walk — 30 easy minutes", sub: "no pace goal",                glyph: "👣" },
  { id: 4, name: "Draft the HO opener",    sub: "hopeful register",            glyph: "✍️" },
  { id: 5, name: "Reply in the Lily group",sub: "",                            glyph: "📮" },
  { id: 6, name: "Water the porch plants", sub: "",                            glyph: "🌱" },
  { id: 7, name: "Read 20 pages",          sub: "wind-down, not work",         glyph: "🔥" },
];
const WAYMARKS = { 1: "the fog lifts", 3: "downhill from here", 5: "harbor lights ahead" };
const done = new Set();

// —— varied rhythm: no two segments alike
const W = 480;
const X = [150, 344, 128, 356, 118, 338, 196];
const STEPS = [0, 148, 126, 168, 132, 152, 124];
const PAD_TOP = 120;
let ys = [], y = PAD_TOP;
TASKS.forEach((t, i) => { y += STEPS[i]; ys.push(y); });
const harbor = { x: 252, y: y + 170 };
const H = harbor.y + 96;
const pts = TASKS.map((t, i) => ({ x: X[i], y: ys[i] }));

function trailD() {
  let d = `M ${W/2} ${PAD_TOP - 66}`;
  const all = [{ x: W/2, y: PAD_TOP - 66 }, ...pts, harbor];
  for (let i = 1; i < all.length; i++) {
    const a = all[i-1], b = all[i], my = (a.y + b.y) / 2;
    d += ` C ${a.x} ${my}, ${b.x} ${my}, ${b.x} ${b.y}`;
  }
  return d;
}

// —— the world: sky, sea, hills, trees, clouds, shore — dusk maritime
function scenery() {
  const hills = `
    <path d="M0 ${PAD_TOP+40} Q 110 ${PAD_TOP-40} 240 ${PAD_TOP+16} T 480 ${PAD_TOP-6} V ${ys[2]} H 0 Z" fill="#131a3c"/>
    <path d="M0 ${ys[1]} Q 140 ${ys[1]-86} 300 ${ys[1]-16} T 480 ${ys[1]-40} V ${ys[4]} H 0 Z" fill="#171f47"/>
    <path d="M0 ${ys[3]+30} Q 170 ${ys[3]-60} 340 ${ys[3]+8} T 480 ${ys[3]-14} V ${ys[6]} H 0 Z" fill="#1b234f"/>
    <path d="M0 ${ys[5]+40} Q 130 ${ys[5]-30} 290 ${ys[5]+26} T 480 ${ys[5]+6} V ${H} H 0 Z" fill="#202650"/>`;
  const tree = (x, y, s, hue) => `
    <g transform="translate(${x} ${y}) scale(${s})">
      <rect x="-2" y="6" width="4" height="10" rx="2" fill="#3a2f4d"/>
      <ellipse cx="0" cy="0" rx="12" ry="14" fill="${hue}"/>
    </g>`;
  const trees =
    tree(64, ys[0]+58, 1, "#25406b") + tree(92, ys[0]+70, .7, "#2b4a72") +
    tree(420, ys[1]+64, 1.1, "#254068") + tree(388, ys[1]+78, .75, "#2b4a72") +
    tree(70, ys[3]+66, 1, "#273f6e") + tree(430, ys[4]+58, .9, "#2b4a72") +
    tree(120, ys[5]+70, .8, "#25406b") + tree(360, ys[5]+84, 1.05, "#273f6e");
  const cloud = (y, dur, delay, s) => `
    <g class="cloud" style="animation-duration:${dur}s; animation-delay:${delay}s" transform="translate(0 ${y}) scale(${s})">
      <ellipse cx="0" cy="0" rx="30" ry="10" fill="#2b345f"/>
      <ellipse cx="22" cy="-6" rx="20" ry="8" fill="#2b345f"/>
    </g>`;
  const clouds = cloud(70, 70, 0, 1) + cloud(ys[1]-60, 95, -30, .8) + cloud(ys[4]-70, 110, -60, 1.15);
  const glints = [ [70, ys[6]+40], [180, ys[6]+70], [330, ys[6]+52], [420, ys[6]+86], [120, harbor.y-30], [370, harbor.y-16] ]
    .map(([x, gy], i) => `<rect class="glint" x="${x}" y="${gy}" width="26" height="2.5" rx="1.25" fill="#7adcff" style="animation-delay:${i * .6}s"/>`).join("");
  const shore = `<path d="M0 ${ys[6]+18} Q 120 ${ys[6]-12} 260 ${ys[6]+22} T 480 ${ys[6]+8} V ${H} H 0 Z" fill="#0e1533"/>`;
  const flies = [ [210, ys[5]-30], [260, ys[6]-60], [150, ys[6]-20] ]
    .map(([x, fy], i) => `<circle class="fly" cx="${x}" cy="${fy}" r="2" fill="#ffe9a3" style="animation-delay:${i*1.3}s"/>`).join("");
  const dock = `
    <g transform="translate(${harbor.x} ${harbor.y})">
      <rect x="-44" y="10" width="88" height="6" rx="3" fill="#3a2f4d"/>
      <rect x="-38" y="16" width="5" height="14" fill="#32284a"/><rect x="33" y="16" width="5" height="14" fill="#32284a"/>
      <text y="-6" text-anchor="middle" font-size="30">🏝</text>
    </g>`;
  return `<rect width="${W}" height="${H}" fill="url(#skyg)"/>` + clouds + hills + trees + shore + glints + flies + dock;
}

const svg = document.getElementById("svg");
svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
svg.innerHTML = `
  <defs>
    <linearGradient id="skyg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1026"/><stop offset=".45" stop-color="#141b3d"/>
      <stop offset=".8" stop-color="#252055"/><stop offset="1" stop-color="#33235a"/>
    </linearGradient>
  </defs>
  ${scenery()}
  <path class="trail-base" d="${trailD()}"/>
  <path class="trail-lit" id="lit" d="${trailD()}"/>
  <g id="waymarks"></g>
  <g id="stops"></g>
  <g class="traveler" id="traveler"><circle r="8.5" fill="#7adcff"/><circle r="3.5" fill="#eafaff"/></g>
`;

const lit = document.getElementById("lit");
const L = lit.getTotalLength();
lit.style.strokeDasharray = L;
lit.style.strokeDashoffset = L;

// stop-length lookup: sample the path once, map each stop to its nearest length
const stopLen = [];
{
  const samples = 600;
  let best = pts.map(() => ({ d: 1e9, len: 0 }));
  for (let s = 0; s <= samples; s++) {
    const len = (L * s) / samples;
    const p = lit.getPointAtLength(len);
    pts.forEach((q, i) => {
      const d = Math.hypot(p.x - q.x, p.y - q.y);
      if (d < best[i].d) best[i] = { d, len };
    });
  }
  best.forEach(b => stopLen.push(b.len));
}

// waymark micro-copy between segments
const wm = document.getElementById("waymarks");
Object.entries(WAYMARKS).forEach(([afterIdx, text]) => {
  const i = +afterIdx;
  const midLen = (stopLen[i] + (stopLen[i+1] ?? L)) / 2;
  const p = lit.getPointAtLength(midLen);
  const side = p.x < W/2 ? 1 : -1;
  wm.innerHTML += `<text class="waymark" x="${p.x + side * 26}" y="${p.y + 4}"
    text-anchor="${side === 1 ? "start" : "end"}">· ${text} ·</text>`;
});

// stops: landmark plate + glyph + two-line label
const stopsG = document.getElementById("stops");
TASKS.forEach((t, i) => {
  const p = pts[i];
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("class", "stop" + (t.focus ? " focus" : ""));
  g.setAttribute("id", "stop-" + t.id);
  const r = t.focus ? 24 : 19;
  const side = p.x < W/2 ? 1 : -1;
  const lx = p.x + side * (r + 13);
  const anchor = side === 1 ? "start" : "end";
  g.innerHTML = `
    <circle class="plate" cx="${p.x}" cy="${p.y}" r="${r}"/>
    <text class="glyph ${t.glyph === "🔥" ? "fire" : ""}" x="${p.x}" y="${p.y}" font-size="${t.focus ? 26 : 21}">${t.glyph}</text>
    <text class="label ${t.focus ? "focuslbl" : ""}" x="${lx}" y="${p.y + (t.sub ? 0 : 5)}" text-anchor="${anchor}">${t.name}</text>
    ${t.sub ? `<text class="label sub" x="${lx}" y="${p.y + 16}" text-anchor="${anchor}" fill="#8a8fa3" font-size="11" font-weight="500">${t.sub}</text>` : ""}
  `;
  g.addEventListener("click", () => arrive(t.id));
  stopsG.appendChild(g);
});

const traveler = document.getElementById("traveler");
let travelerLen = 0;
function placeTraveler(len) {
  const p = lit.getPointAtLength(Math.max(0, Math.min(len, L - 1)));
  traveler.setAttribute("transform", `translate(${p.x}, ${p.y})`);
}
placeTraveler(0);

function walkTo(targetLen) {
  const from = travelerLen, dist = targetLen - from, dur = 1100, t0 = performance.now();
  (function step(now) {
    const k = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - k, 3);
    placeTraveler(from + dist * e);
    if (k < 1) requestAnimationFrame(step); else travelerLen = targetLen;
  })(performance.now());
}

function frontierLen() {
  const idxs = [...done].map(id => TASKS.findIndex(t => t.id === id));
  return idxs.length ? stopLen[Math.max(...idxs)] : 0;
}
function updateNextPulse() {
  TASKS.forEach(t => document.getElementById("stop-" + t.id).classList.remove("next"));
  const next = TASKS.find(t => !done.has(t.id));
  if (next) document.getElementById("stop-" + next.id).classList.add("next");
}
function updateProg() {
  document.getElementById("prog").textContent = `${done.size} of ${TASKS.length} stops`;
}
updateNextPulse(); updateProg();

function arrive(id) {
  if (done.has(id)) return;
  done.add(id);
  const el = document.getElementById("stop-" + id);
  el.classList.add("done");
  const f = frontierLen();
  lit.style.strokeDashoffset = L - f;
  walkTo(f);
  updateNextPulse(); updateProg();
  if (done.size === TASKS.length) setTimeout(finish, 1200);
}

function finish() {
  lit.style.strokeDashoffset = 0;
  walkTo(L - 1);
  setTimeout(() => {
    document.getElementById("finline").textContent = "Every lantern lit. The boat can go out.";
    document.getElementById("fin").classList.add("show");
    for (let i = 0; i < 36; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.textContent = ["✨","🎉","⭐️","🔸"][i % 4];
      c.style.left = Math.random() * 100 + "vw";
      c.style.animationDuration = 2.2 + Math.random() * 2 + "s";
      c.style.animationDelay = Math.random() * .8 + "s";
      document.body.appendChild(c);
    }
  }, 950);
}
document.getElementById("fin").addEventListener("click", () => document.getElementById("fin").classList.remove("show"));
</script>
</body>
</html>
